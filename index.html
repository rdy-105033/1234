<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>現代收藏館</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        md3: {
                            l_bg: '#FAFDFD', l_surface: '#FAFDFD', l_surfaceContainer: '#ECEFEF', l_surfaceContainerHigh: '#E6E9E9',
                            l_primary: '#006874', l_onPrimary: '#ffffff', l_primaryContainer: '#97F0FF', l_onPrimaryContainer: '#001F24',
                            l_secondaryContainer: '#CCE8E7', l_onSecondaryContainer: '#051F1F', l_text: '#191C1C', l_textVariant: '#3F484A',
                            l_outline: '#6F797A', l_outlineVariant: '#BFC8C9',
                            d_bg: '#0E1414', d_surface: '#0E1414', d_surfaceContainer: '#1A2020', d_surfaceContainerHigh: '#252B2B',
                            d_primary: '#4FD8EB', d_onPrimary: '#00363D', d_primaryContainer: '#004F58', d_onPrimaryContainer: '#97F0FF',
                            d_secondaryContainer: '#334B4B', d_onSecondaryContainer: '#CCE8E7', d_text: '#E0E3E3', d_textVariant: '#BFC8C9',
                            d_outline: '#899394', d_outlineVariant: '#3F484A',
                        }
                    },
                    transitionTimingFunction: {
                        'm3-spring': 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                        'm3-standard': 'cubic-bezier(0.2, 0.8, 0.2, 1)'
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
        
        /* M3 漣漪水波紋 */
        .ripple { position: relative; overflow: hidden; }
        .ripple::after { content: ""; position: absolute; inset: 0; background: currentColor; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
        .ripple:active::after { opacity: 0.12; }
        
        /* 彈簧回彈效果 */
        .transition-spring {
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .transition-standard {
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 飄浮光暈動畫 */
        @keyframes blob-float {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob-float 12s infinite ease-in-out;
        }
        .animation-delay-2000 { animation-delay: 2.5s; }
        .animation-delay-4000 { animation-delay: 5s; }

        /* 骨架屏閃爍 */
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
        .shimmer-bg {
            position: relative;
            overflow: hidden;
        }
        .shimmer-bg::after {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.2) 20%,
                rgba(255, 255, 255, 0.4) 60%,
                rgba(255, 255, 255, 0) 100%
            );
            animation: shimmer 1.5s infinite;
            content: '';
        }
        .dark .shimmer-bg::after {
            background-image: linear-gradient(
                90deg,
                rgba(0, 0, 0, 0) 0%,
                rgba(255, 255, 255, 0.05) 20%,
                rgba(255, 255, 255, 0.1) 60%,
                rgba(255, 255, 255, 0) 100%
            );
        }

        /* 點讚大愛心噴發動畫 */
        @keyframes heart-burst {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(10deg); opacity: 1; }
            70% { transform: scale(0.9) rotate(-5deg); opacity: 1; }
            100% { transform: scale(0) rotate(0deg); opacity: 0; }
        }
        .animate-heart-burst {
            animation: heart-burst 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        body {
            transition: background-color 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), color 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
    </style>
</head>
<body class="bg-md3-l_bg text-md3-l_text dark:bg-md3-d_bg dark:text-md3-d_text font-sans antialiased overflow-x-hidden min-h-screen">

    <!-- 背景動態流暢光暈 -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none opacity-50 dark:opacity-30 transition-opacity duration-1000">
        <div class="absolute -top-40 -left-40 w-[500px] h-[500px] rounded-full mix-blend-multiply filter blur-3xl animate-blob bg-[#97F0FF]"></div>
        <div class="absolute top-1/4 -right-40 w-[450px] h-[450px] rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-2000 bg-[#CCE8E7]"></div>
        <div class="absolute -bottom-40 left-10 w-[500px] h-[500px] rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-4000 bg-[#E6E9E9]/40"></div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 z-[200] flex flex-col items-center justify-center bg-md3-l_bg dark:bg-md3-d_bg transition-all duration-700 ease-m3-standard">
        <div class="relative flex items-center justify-center mb-6">
            <div class="w-16 h-16 rounded-full border-4 border-md3-l_primaryContainer dark:border-md3-d_primaryContainer border-t-md3-l_primary dark:border-t-md3-d_primary animate-spin"></div>
            <i data-lucide="compass" class="absolute w-6 h-6 text-md3-l_primary dark:text-md3-d_primary"></i>
        </div>
        <div class="text-lg font-medium tracking-wide animate-pulse">正在開啟收藏空間...</div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="hidden fixed inset-0 flex flex-col items-center justify-center p-6 bg-md3-l_bg dark:bg-md3-d_bg z-[150] transition-all duration-700 ease-m3-standard">
        <div class="max-w-md w-full flex flex-col items-center p-8 rounded-[36px] bg-white/40 dark:bg-black/20 border border-white/20 dark:border-white/5 backdrop-blur-xl shadow-2xl transition-all hover:scale-[1.01]">
            <div class="p-6 rounded-[28px] mb-8 bg-md3-l_primaryContainer text-md3-l_onPrimaryContainer dark:bg-md3-d_primaryContainer dark:text-md3-d_onPrimaryContainer shadow-lg shadow-md3-l_primary/10">
                <i data-lucide="compass" class="w-16 h-16 animate-pulse"></i>
            </div>
            <h1 class="text-4xl font-light tracking-tight mb-4 text-center">現代收藏館</h1>
            <p class="text-center mb-10 text-md3-l_textVariant dark:text-md3-d_textVariant max-w-xs text-[15px] leading-relaxed">
                打造專屬於您的數位收藏空間。<br/>請登入以同步您的雲端資料庫。
            </p>
            <div class="w-full space-y-3">
                <button id="btn-login" class="w-full flex items-center justify-center gap-4 px-6 py-4.5 rounded-full shadow-lg active:scale-95 hover:shadow-xl transition-all duration-300 ripple bg-md3-l_primaryContainer text-md3-l_onPrimaryContainer dark:bg-md3-d_primaryContainer dark:text-md3-d_onPrimaryContainer hover:brightness-105">
                    <svg class="w-6 h-6 shrink-0" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    <span class="font-semibold text-base">使用 Google 帳號登入</span>
                </button>
                <button id="btn-guest-login" class="w-full flex items-center justify-center gap-2 px-6 py-3.5 rounded-full border border-md3-l_outlineVariant/30 dark:border-md3-d_outlineVariant/30 active:scale-95 transition-all text-sm font-semibold hover:bg-black/5 dark:hover:bg-white/5 text-md3-l_textVariant dark:text-md3-d_textVariant">
                    <i data-lucide="user-check" class="w-4 h-4"></i>
                    <span>以訪客身份體驗（免登入預覽）</span>
                </button>
            </div>
        </div>
        <button id="btn-toggle-theme-login" class="absolute top-6 right-6 p-3 rounded-full border border-md3-l_outlineVariant/30 hover:bg-black/5 dark:hover:bg-white/5 active:scale-95 transition-all">
            <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
            <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        </button>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden opacity-0 transform translate-y-8 transition-all duration-700 ease-m3-standard relative z-10">
        
        <!-- App Bar -->
        <header id="top-app-bar" class="sticky top-0 z-40 w-full transition-all duration-500 backdrop-blur-lg bg-md3-l_bg/80 dark:bg-md3-d_bg/80 border-b border-transparent">
            <div class="h-16 px-4 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <button id="btn-open-drawer" class="p-3 -ml-2 rounded-full active:scale-90 hover:bg-black/5 dark:hover:bg-white/5 transition-all ripple">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h1 id="top-bar-title" class="text-[20px] font-semibold transition-opacity duration-300 opacity-0 tracking-wide">探索收藏</h1>
                </div>
                <button class="p-3 rounded-full active:scale-90 hover:bg-black/5 dark:hover:bg-white/5 transition-all">
                    <i data-lucide="user" class="w-6 h-6"></i>
                </button>
            </div>
            <div id="top-bar-large-title-container" class="px-6 transition-all duration-300 overflow-hidden h-[72px] opacity-100 flex items-end pb-4">
                <h1 id="top-bar-large-title" class="text-[32px] font-normal tracking-tight">探索收藏</h1>
            </div>
        </header>

        <!-- Multi-select Bar -->
        <div id="multi-select-bar" class="fixed top-0 w-full z-50 h-16 flex items-center justify-between px-4 transition-all duration-500 transform -translate-y-full shadow-lg backdrop-blur-lg bg-md3-l_surfaceContainerHigh/90 dark:bg-md3-d_surfaceContainerHigh/90">
            <div class="flex items-center gap-4">
                <button id="btn-cancel-select" class="p-2 rounded-full active:scale-90 hover:bg-black/5 dark:hover:bg-white/5 transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
                <span id="select-count" class="text-lg font-medium">已選擇 0 項</span>
            </div>
            <div class="flex gap-2">
                <button id="btn-delete-selected" class="p-3 rounded-full active:scale-90 hover:bg-red-500/10 text-red-500 transition-all">
                    <i data-lucide="trash-2" class="w-6 h-6"></i>
                </button>
            </div>
        </div>

        <main class="container mx-auto px-4 pb-28 pt-2 max-w-5xl">
            <!-- Search & Filters -->
            <div id="home-controls" class="transition-all duration-500">
                <div class="flex items-center h-14 rounded-full px-4 mb-6 shadow-sm border border-transparent focus-within:border-md3-l_primary/20 focus-within:ring-4 focus-within:ring-md3-l_primary/5 dark:focus-within:ring-md3-d_primary/5 transition-all bg-md3-l_surfaceContainerHigh dark:bg-md3-d_surfaceContainerHigh">
                    <i data-lucide="search" class="w-6 h-6 text-md3-l_textVariant dark:text-md3-d_textVariant"></i>
                    <input type="text" id="search-input" placeholder="搜尋你的收藏..." class="flex-1 bg-transparent border-none outline-none px-3 text-[16px]">
                    <button id="btn-clear-search" class="hidden p-1 rounded-full active:scale-90 hover:bg-black/5 dark:hover:bg-white/5 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                
                <div id="category-filters" class="flex gap-2 overflow-x-auto scrollbar-hide pb-2 mb-4 snap-x">
                    <!-- Categories injected via JS -->
                </div>
            </div>

            <!-- View Toggle & Count -->
            <div class="flex justify-between items-center mb-6 px-1">
                <span id="item-count" class="text-[14px] font-medium text-md3-l_textVariant dark:text-md3-d_textVariant">共 0 件物品</span>
                <button id="btn-toggle-view" class="p-3 rounded-full hover:bg-black/5 dark:hover:bg-white/5 active:scale-90 transition-all">
                    <i data-lucide="list" class="w-6 h-6"></i>
                </button>
            </div>

            <!-- Items Container -->
            <div id="items-container" class="grid gap-5 grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
                <!-- Cards injected via JS -->
            </div>
        </main>

        <!-- FAB -->
        <button id="fab-add" class="fixed bottom-24 right-4 z-30 shadow-lg hover:shadow-xl flex items-center justify-center transition-all duration-500 ease-m3-spring rounded-[24px] h-14 w-auto px-5 bg-md3-l_primaryContainer text-md3-l_onPrimaryContainer dark:bg-md3-d_primaryContainer dark:text-md3-d_onPrimaryContainer hover:brightness-[1.03]">
            <i data-lucide="plus" class="w-6 h-6 shrink-0 transition-transform hover:rotate-90 duration-300"></i>
            <span class="font-semibold ml-2.5 overflow-hidden whitespace-nowrap transition-all duration-300 w-10 opacity-100">新增</span>
        </button>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="fixed bottom-0 w-full z-40 pb-safe border-t border-md3-l_outlineVariant/10 dark:border-md3-d_outlineVariant/10 backdrop-blur-md bg-md3-l_surfaceContainer/80 dark:bg-md3-d_surfaceContainer/80 transition-all duration-500">
            <div class="flex justify-around items-center h-[80px]">
                <button data-tab="home" class="nav-tab flex flex-col items-center gap-1 w-20 group relative overflow-hidden active:scale-95 transition-transform duration-150">
                    <div class="nav-indicator w-16 h-8 rounded-full flex items-center justify-center transition-all duration-500 bg-md3-l_secondaryContainer dark:bg-md3-d_secondaryContainer">
                        <i data-lucide="home" class="w-6 h-6 text-md3-l_onSecondaryContainer dark:text-md3-d_onSecondaryContainer fill-current transition-transform group-hover:scale-110 duration-300"></i>
                    </div>
                    <span class="nav-text text-[12px] font-semibold tracking-wide text-md3-l_text dark:text-md3-d_text transition-colors duration-300">首頁</span>
                </button>
                <button data-tab="bookmarks" class="nav-tab flex flex-col items-center gap-1 w-20 group relative overflow-hidden active:scale-95 transition-transform duration-150">
                    <div class="nav-indicator w-16 h-8 rounded-full flex items-center justify-center transition-all duration-500 bg-transparent">
                        <i data-lucide="bookmark" class="w-6 h-6 text-md3-l_textVariant dark:text-md3-d_textVariant transition-transform group-hover:scale-110 duration-300"></i>
                    </div>
                    <span class="nav-text text-[12px] font-semibold tracking-wide text-md3-l_textVariant dark:text-md3-d_textVariant transition-colors duration-300">收藏</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Drawer (側邊欄) -->
    <div id="drawer" class="fixed inset-0 z-[100] flex opacity-0 pointer-events-none transition-all duration-500">
        <div id="drawer-scrim" class="absolute inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm transition-opacity duration-500 opacity-0"></div>
        <div class="relative w-80 h-full shadow-2xl flex flex-col transition-transform duration-500 transform -translate-x-full rounded-r-[32px] bg-md3-l_surfaceContainer dark:bg-md3-d_surfaceContainer">
            <div class="p-6 pb-4 flex items-center gap-4">
                <div id="drawer-avatar" class="w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl shadow-md bg-md3-l_primaryContainer text-md3-l_onPrimaryContainer dark:bg-md3-d_primaryContainer dark:text-md3-d_onPrimaryContainer">U</div>
                <div>
                    <h2 id="drawer-name" class="text-lg font-semibold tracking-wide leading-tight">收藏家</h2>
                    <p id="drawer-email" class="text-sm text-md3-l_textVariant dark:text-md3-d_textVariant">email@example.com</p>
                </div>
            </div>
            <div class="px-3 space-y-1 mt-4 flex-1 flex flex-col">
                <div class="h-px w-full my-2 bg-black/10 dark:bg-white/10"></div>
                <div id="btn-toggle-theme" class="w-full flex items-center justify-between px-4 py-4 rounded-full active:scale-95 hover:bg-black/5 dark:hover:bg-white/5 transition-all duration-300 cursor-pointer">
                    <div class="flex items-center gap-3">
                        <i data-lucide="moon" class="w-6 h-6 dark:hidden text-md3-l_textVariant"></i>
                        <i data-lucide="sun" class="w-6 h-6 hidden dark:block text-md3-d_textVariant"></i>
                        <span class="font-semibold text-[15px]">深色主題</span>
                    </div>
                    <div id="theme-switch-bg" class="w-12 h-8 rounded-full flex items-center p-1 transition-colors bg-md3-l_surfaceContainerHigh dark:bg-md3-d_primary">
                        <div id="theme-switch-knob" class="w-6 h-6 rounded-full shadow transition-transform translate-x-0 bg-[#6F797A] dark:bg-[#00363D]"></div>
                    </div>
                </div>
                <button id="btn-logout" class="w-full flex items-center gap-3 px-4 py-4 rounded-full text-red-500 active:scale-95 hover:bg-red-500/5 transition-all mt-auto mb-6">
                    <i data-lucide="log-out" class="w-6 h-6"></i>
                    <span class="font-semibold text-[15px]">登出帳號</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="add-modal" class="fixed inset-0 z-[100] flex items-end opacity-0 pointer-events-none transition-all duration-500">
        <div id="add-scrim" class="absolute inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm transition-opacity duration-500 opacity-0"></div>
        <div id="add-sheet" class="relative w-full max-w-2xl mx-auto h-[90vh] rounded-t-[32px] shadow-2xl flex flex-col transition-transform duration-500 transform translate-y-full bg-md3-l_surfaceContainer dark:bg-md3-d_surfaceContainer">
            <div class="w-full flex justify-center pt-4 pb-2 shrink-0 cursor-grab touch-action-none" id="add-drag-handle">
                <div class="w-10 h-1.5 rounded-full bg-md3-l_outlineVariant/60 dark:bg-md3-d_outlineVariant/60"></div>
            </div>
            <div class="flex justify-between items-center px-6 pb-2 border-b border-black/10 dark:border-white/10 shrink-0">
                <h2 class="text-[22px] font-semibold">新增收藏</h2>
                <button id="btn-close-add" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/5 active:scale-90 transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6 pb-safe">
                <!-- Image Upload -->
                <div id="image-upload-area" class="w-full aspect-video rounded-[28px] border-2 border-dashed flex flex-col items-center justify-center cursor-pointer overflow-hidden transition-all duration-300 border-md3-l_outlineVariant/50 dark:border-md3-d_outlineVariant/50 hover:border-md3-l_primary dark:hover:border-md3-d_primary bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10">
                    <div id="upload-placeholder" class="flex flex-col items-center p-4">
                        <i data-lucide="image-plus" class="w-10 h-10 mb-2 text-md3-l_textVariant dark:text-md3-d_textVariant"></i>
                        <span class="font-medium text-md3-l_textVariant dark:text-md3-d_textVariant text-sm">點擊上傳圖片 (自動壓縮防出錯)</span>
                    </div>
                    <img id="upload-preview" src="" class="hidden w-full h-full object-cover">
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                </div>
                <!-- Form -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-md3-l_textVariant dark:text-md3-d_textVariant">標題 *</label>
                        <input type="text" id="add-title" class="w-full h-14 px-4 rounded-2xl border border-transparent outline-none focus:border-md3-l_primary/30 focus:ring-4 focus:ring-md3-l_primary/5 transition-all bg-md3-l_surfaceContainerHigh dark:bg-md3-d_surfaceContainerHigh" placeholder="例如：復古底片相機">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-md3-l_textVariant dark:text-md3-d_textVariant">分類</label>
                        <select id="add-category" class="w-full h-14 px-4 rounded-2xl outline-none appearance-none bg-md3-l_surfaceContainerHigh dark:bg-md3-d_surfaceContainerHigh">
                            <!-- Options injected via JS -->
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-md3-l_textVariant dark:text-md3-d_textVariant">描述故事</label>
                        <textarea id="add-desc" class="w-full p-4 rounded-2xl outline-none resize-none h-32 focus:border-md3-l_primary/30 focus:ring-4 focus:ring-md3-l_primary/5 transition-all bg-md3-l_surfaceContainerHigh dark:bg-md3-d_surfaceContainerHigh" placeholder="寫下這件物品的特別之處..."></textarea>
                    </div>
                </div>
                <button id="btn-submit-add" class="w-full h-14 rounded-full font-semibold text-lg flex items-center justify-center gap-2 transition-all active:scale-95 shadow-md hover:shadow-lg bg-md3-l_primary text-md3-l_onPrimary dark:bg-md3-d_primary dark:text-md3-d_onPrimary">
                    儲存收藏
                </button>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="fixed inset-0 z-[100] flex items-end opacity-0 pointer-events-none transition-all duration-500">
        <div id="detail-scrim" class="absolute inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm transition-opacity duration-500 opacity-0"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

        // === Firebase Initialization ===

            { id: 'mock-2', title: '客製青軸機械鍵盤', category: '科技', description: '流暢的青軸打字聲，多層金屬質感外殼與客製鍵帽。', image: 'https://images.unsplash.com/photo-1595225476474-87563907a212?auto=format&fit=crop&w=800&q=80', likes: 8, isBookmarked: false, date: '2026-05-19', timestamp: Date.now() }

            categoryFilters: document.getElementById('category-filters'),

        // 初始化圖示

        // === Haptic Feedback ===
        function triggerHaptic(type = 'light') {
            if (navigator.vibrate) {
                if (type === 'light') navigator.vibrate(10);

        // === Snackbar ===
        function showSnackbar(message) {
            const id = Date.now();
            const sb = document.createElement('div');
            sb.className = 'bg-[#313033] dark:bg-[#E6E1E5] text-[#F4EFF4] dark:text-[#313033] px-5 py-3.5 rounded-2xl shadow-xl flex justify-between items-center animate-fade-in-up pointer-events-auto border border-white/10';
            sb.innerHTML = `<span class="text-[14px] font-semibold">${message}</span><button class="text-[#D0BCFF] dark:text-[#6750A4] text-[14px] font-semibold hover:opacity-80 active:scale-95 ml-4">關閉</button>`;
            sb.querySelector('button').onclick = () => sb.remove();
            els.snackbarContainer.appendChild(sb);
            setTimeout(() => { if (sb.parentNode) sb.remove(); }, 3000);
        }

        // === Canvas 圖片壓縮引擎 ===
        function compressAndLoadImage(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max_size = 800; // 最大解析度
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > max_size) {
                            height *= max_size / width;
                            width = max_size;
                        }
                    } else {
                        if (height > max_size) {
                            width *= max_size / height;
                            height = max_size;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7); // 壓縮為 70% 品質的 JPEG
                    callback(compressedBase64);
                };
            };
        }

        // === 漸變控制切換過渡 ===
        function showAppLayout() {
            els.login.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
            setTimeout(() => els.login.classList.add('hidden'), 500);

            els.mainApp.classList.remove('hidden');
            setTimeout(() => {
                els.mainApp.classList.remove('opacity-0', 'translate-y-8');
            }, 100);
        }

        function hideAppLayout() {
            els.mainApp.classList.add('opacity-0', 'translate-y-8');
            setTimeout(() => {
                els.mainApp.classList.add('hidden');
                els.login.classList.remove('hidden');
                setTimeout(() => {
                    els.login.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
                }, 100);
            }, 500);
        }

        // === STREAMING_CHUNK: Creating dynamic card rendering with double-tap Instagram likes... ===
        // === Auth logic ===
        onAuthStateChanged(auth, (user) => {
            els.loading.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => els.loading.classList.add('hidden'), 700);

            if (user && !isGuestMode) {
                currentUser = user;
                showAppLayout();
                document.getElementById('drawer-avatar').innerText = user.displayName?.[0] || 'U';
                document.getElementById('drawer-name').innerText = user.displayName || '收藏家';
                document.getElementById('drawer-email').innerText = user.email || '';
                setupFirestore();
            } else if (!isGuestMode) {
                currentUser = null;
                hideAppLayout();
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                items = [];
            }
        });

        // 登入
        document.getElementById('btn-login').onclick = async () => {
            try {
                isGuestMode = false;
                await signInWithPopup(auth, new GoogleAuthProvider());
                showSnackbar("歡迎回到您的收藏館！");
            } catch (err) {
                console.error("Auth popup blocked or COOP error. Offering guest mode.", err);
                showSnackbar("驗證視窗被阻擋，建議您點擊「訪客模式」預覽！");
            }
        };

        // 訪客登入
        document.getElementById('btn-guest-login').onclick = () => {
            isGuestMode = true;
            currentUser = { uid: 'guest-preview', displayName: '訪客體驗帳號', email: 'guest@local.demo' };
            showSnackbar("已開啟免登入訪客模式！");
            showAppLayout();
            document.getElementById('drawer-avatar').innerText = 'G';
            document.getElementById('drawer-name').innerText = '訪客體驗帳號';
            document.getElementById('drawer-email').innerText = '資料將儲存於本地瀏覽器';
            
            // 讀取本地快取或使用預設資料
            const localCached = localStorage.getItem('guest_items');
            if (localCached) {
                items = JSON.parse(localCached);
            } else {
                items = [...defaultMockItems];
                localStorage.setItem('guest_items', JSON.stringify(items));
            }
            renderUI();
        };

        // 登出
        document.getElementById('btn-logout').onclick = async () => {
            if (isGuestMode) {
                isGuestMode = false;
                currentUser = null;
                items = [];
                hideAppLayout();
                closeDrawer();
                showSnackbar("已結束訪客體驗");
            } else {
                await signOut(auth);
                closeDrawer();
                showSnackbar("已安全登出");
            }
        };

        // === Firestore Setup ===
        function setupFirestore() {
            if (!currentUser || isGuestMode) return;
            const itemsRef = collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'items');
            unsubscribeSnapshot = onSnapshot(itemsRef, (snapshot) => {
                items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderUI();
            }, (error) => {
                showSnackbar("資料同步異常，請確認連線。");
            });
        }

        // === Instagram 風格雙擊點讚 ===
        function triggerDoubleTapLike(cardEl, itemId) {
            const container = cardEl.querySelector('.image-container');
            if (!container) return;

            // 建立大愛心
            const burstHeart = document.createElement('div');
            burstHeart.className = 'absolute inset-0 z-20 flex items-center justify-center pointer-events-none text-red-500 opacity-0';
            burstHeart.innerHTML = '<i data-lucide="heart" class="w-20 h-20 fill-current animate-heart-burst"></i>';
            container.appendChild(burstHeart);
            lucide.createIcons();

            // 移除大愛心
            setTimeout(() => burstHeart.remove(), 800);

            // 更新按讚數
            updateLikeCount(itemId);
        }

        async function updateLikeCount(itemId) {
            triggerHaptic('heavy');
            const targetItem = items.find(i => i.id === itemId);
            if (!targetItem) return;

            const nextLikes = (targetItem.likes || 0) + 1;

            if (isGuestMode) {
                targetItem.likes = nextLikes;
                localStorage.setItem('guest_items', JSON.stringify(items));
                renderUI();
            } else if (currentUser) {
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'items', itemId), { likes: nextLikes });
            }
        }

        // === STREAMING_CHUNK: Writing the swipe-to-dismiss gesture handling with inertia... ===
        // === UI 繪製邏輯 ===
        function renderUI() {
            // 繪製過濾 Chip
            els.categoryFilters.innerHTML = '';
            categories.forEach(cat => {
                const isSelected = activeCategory === cat;
                const btn = document.createElement('button');
                btn.className = `snap-start flex items-center gap-1.5 h-8 px-4.5 rounded-full border ripple transition-spring ${
                    isSelected ? 'bg-md3-l_secondaryContainer text-md3-l_onSecondaryContainer dark:bg-md3-d_secondaryContainer dark:text-md3-d_onSecondaryContainer border-transparent scale-105 shadow-sm font-semibold' 
                               : 'bg-transparent border-md3-l_outlineVariant/30 dark:border-md3-d_outlineVariant/30 text-md3-l_textVariant dark:text-md3-d_textVariant hover:bg-black/5 dark:hover:bg-white/5'
                }`;
                btn.innerHTML = `${isSelected ? '<i data-lucide="check" class="w-4 h-4"></i>' : ''}<span class="text-[14px] whitespace-nowrap">${cat}</span>`;
                btn.onclick = () => { activeCategory = cat; triggerHaptic(); renderUI(); };
                els.categoryFilters.appendChild(btn);
            });

            // 過濾並排序資料
            let processed = items.filter(item => {
                const matchCat = activeCategory === '全部' || item.category === activeCategory;
                const matchSearch = (item.title || '').toLowerCase().includes(searchQuery.toLowerCase());
                const matchTab = activeTab === 'bookmarks' ? item.isBookmarked : true;
                return matchCat && matchSearch && matchTab;
            });
            processed.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            els.itemCount.innerText = `共 ${processed.length} 件物品`;

            els.itemsContainer.className = `grid gap-5 ${viewMode === 'grid' ? 'grid-cols-2 md:grid-cols-3' : 'grid-cols-1'}`;
            els.itemsContainer.innerHTML = '';

            if (processed.length === 0) {
                els.itemsContainer.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-24 animate-fade-in text-md3-l_textVariant dark:text-md3-d_textVariant">
                        <i data-lucide="compass" class="w-16 h-16 mb-4 opacity-40 animate-pulse"></i>
                        <h3 class="text-lg font-semibold mb-1">找不到相關展品</h3>
                        <p class="text-sm opacity-80">試著更換關鍵字或分類晶片</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            processed.forEach((item, idx) => {
                const isSelected = selectedItems.has(item.id);
                const card = document.createElement('div');
                card.style.animationDelay = `${idx * 40}ms`;
                card.className = `relative rounded-[28px] overflow-hidden transition-spring hover:-translate-y-1.5 animate-fade-in-up flex flex-col active:scale-[0.98] ripple cursor-pointer border ${
                    isSelected ? 'bg-md3-l_secondaryContainer dark:bg-md3-d_secondaryContainer border-md3-l_primary/30 dark:border-md3-d_primary/30 shadow-md' 
                               : 'bg-[#FAFDFD]/70 dark:bg-[#1A2020]/70 backdrop-blur-md border-white/20 dark:border-white/5 shadow-sm hover:shadow-lg hover:shadow-md3-l_primary/5'
                } ${viewMode === 'list' ? 'flex-row items-center p-4 gap-5' : ''}`;
                
                card.innerHTML = `
                    ${isSelected ? `<div class="absolute inset-0 bg-black/15 z-10 flex items-center justify-center pointer-events-none"><div class="w-10 h-10 rounded-full flex items-center justify-center bg-md3-l_primary text-md3-l_onPrimary dark:bg-md3-d_primary dark:text-md3-d_onPrimary animate-pop"><i data-lucide="check" class="w-6 h-6"></i></div></div>` : ''}
                    <div class="image-container relative overflow-hidden shrink-0 bg-black/5 dark:bg-white/5 rounded-[22px] transition-all duration-500 group ${viewMode === 'grid' ? 'aspect-square w-full' : 'w-24 h-24'}">
                        <img src="${item.image}" class="w-full h-full object-cover opacity-0 transition-opacity duration-700 hover:scale-105 transform ease-m3-standard" onerror="this.src='https://placehold.co/400x400/ecefef/191c1c?text=No+Image'" onload="this.classList.remove('opacity-0')">
                    </div>
                    <div class="flex flex-col justify-between ${viewMode === 'grid' ? 'p-5 flex-1' : 'flex-1 py-1 pr-2'}">
                        <div>
                            <h3 class="font-bold text-[17px] leading-snug tracking-wide line-clamp-1">${item.title}</h3>
                            <p class="text-[14px] line-clamp-2 leading-relaxed mb-4 mt-1 text-md3-l_textVariant dark:text-md3-d_textVariant">${item.description || '點擊閱讀完整收藏故事。'}</p>
                        </div>
                        <div class="flex items-center justify-between mt-auto text-md3-l_textVariant dark:text-md3-d_textVariant">
                            <button data-action="like" data-id="${item.id}" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full hover:bg-black/5 dark:hover:bg-white/5 transition-all ripple relative z-20">
                                <i data-lucide="heart" class="w-5 h-5 transition-transform active:scale-75 ${item.likes > 0 ? 'fill-[#BA1A1A] text-[#BA1A1A]' : ''}"></i>
                                <span class="text-[13px] font-semibold">${item.likes || 0}</span>
                            </button>
                            <button data-action="bookmark" data-id="${item.id}" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/5 transition-all ripple relative z-20">
                                <i data-lucide="bookmark" class="w-5 h-5 ${item.isBookmarked ? 'fill-md3-l_primary text-md3-l_primary dark:fill-md3-d_primary dark:text-md3-d_primary' : ''}"></i>
                            </button>
                        </div>
                    </div>
                `;

                // 綁定卡片事件 (單擊、雙擊點讚)
                card.onclick = (e) => {
                    if (e.target.closest('button[data-action]')) return;
                    
                    const currentTime = Date.now();
                    const tapLength = currentTime - lastTapTime;
                    if (tapLength < 300 && tapLength > 0) {
                        // 雙擊事件
                        triggerDoubleTapLike(card, item.id);
                    } else {
                        // 單擊事件
                        if (isMultiSelectMode) {
                            toggleSelection(item.id);
                        } else {
                            openDetail(item);
                        }
                    }
                    lastTapTime = currentTime;
                };

                card.oncontextmenu = (e) => {
                    e.preventDefault();
                    triggerHaptic('heavy');
                    isMultiSelectMode = true;
                    toggleSelection(item.id);
                };

                els.itemsContainer.appendChild(card);
            });

            // 綁定操作按鈕
            document.querySelectorAll('button[data-action="like"]').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    updateLikeCount(id);
                };
            });

            document.querySelectorAll('button[data-action="bookmark"]').forEach(btn => {
                btn.onclick = async (e) => {
                    e.stopPropagation();
                    triggerHaptic();
                    const id = btn.dataset.id;
                    const targetItem = items.find(i => i.id === id);
                    if (!targetItem) return;

                    const nextBookmarked = !targetItem.isBookmarked;

                    if (isGuestMode) {
                        targetItem.isBookmarked = nextBookmarked;
                        localStorage.setItem('guest_items', JSON.stringify(items));
                        renderUI();
                        showSnackbar(nextBookmarked ? '已加入收藏夾' : '已從收藏夾移除');
                    } else if (currentUser) {
                        await updateDoc(doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'items', id), { isBookmarked: nextBookmarked });
                        showSnackbar(nextBookmarked ? '已加入收藏夾' : '已從收藏夾移除');
                    }
                };
            });

            // 批次管理 App Bar
            if (isMultiSelectMode) {
                els.multiSelectBar.classList.remove('-translate-y-full');
                els.selectCount.innerText = `已選擇 ${selectedItems.size} 項`;
            } else {
                els.multiSelectBar.classList.add('-translate-y-full');
            }

            lucide.createIcons();
        }

        // --- 底部抽屜與表單彈出動畫優化 (避免 hidden 衝突) ---
        function openDrawer() {
            triggerHaptic();
            els.drawer.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                els.drawer.querySelector('#drawer-scrim').classList.remove('opacity-0');
                els.drawer.querySelector('.relative').classList.remove('-translate-x-full');
            }, 10);
        }

        function closeDrawer() {
            els.drawer.querySelector('#drawer-scrim').classList.add('opacity-0');
            els.drawer.querySelector('.relative').classList.add('-translate-x-full');
            setTimeout(() => {
                els.drawer.classList.add('opacity-0', 'pointer-events-none');
            }, 500);
        }

        document.getElementById('btn-open-drawer').onclick = openDrawer;
        document.getElementById('drawer-scrim').onclick = closeDrawer;

        // Add Modal 表單重置與開關
        function resetAddForm() {
            document.getElementById('add-title').value = '';
            document.getElementById('add-desc').value = '';
            document.getElementById('add-category').selectedIndex = 0;
            base64Image = '';
            document.getElementById('upload-preview').classList.add('hidden');
            document.getElementById('upload-preview').src = '';
            document.getElementById('upload-placeholder').classList.remove('hidden');
        }

        // 初始化新增分類選單
        const selectCat = document.getElementById('add-category');
        categories.slice(1).forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat; opt.innerText = cat;
            selectCat.appendChild(opt);
        });

        function openAddModal() {
            triggerHaptic();
            resetAddForm();
            els.addModal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                els.addModal.querySelector('#add-scrim').classList.remove('opacity-0');
                document.getElementById('add-sheet').classList.remove('translate-y-full');
            }, 10);
        }

        function closeAddModal() {
            els.addModal.querySelector('#add-scrim').classList.add('opacity-0');
            document.getElementById('add-sheet').classList.add('translate-y-full');
            setTimeout(() => {
                els.addModal.classList.add('opacity-0', 'pointer-events-none');
            }, 500);
        }

        els.fab.onclick = openAddModal;
        document.getElementById('add-scrim').onclick = closeAddModal;
        document.getElementById('btn-close-add').onclick = closeAddModal;

        // Image Selection with Compression
        document.getElementById('image-upload-area').onclick = () => document.getElementById('file-input').click();
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;

            // 進行自動畫布壓縮 (Canvas Compression)
            compressAndLoadImage(file, (compressedBase64) => {
                base64Image = compressedBase64;
                document.getElementById('upload-preview').src = base64Image;
                document.getElementById('upload-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
                showSnackbar("圖片已成功縮減壓縮，防出錯");
            });
        };

        // Submit New Item
        document.getElementById('btn-submit-add').onclick = async (e) => {
            const btn = e.target;
            const title = document.getElementById('add-title').value;
            const cat = document.getElementById('add-category').value;
            const desc = document.getElementById('add-desc').value;

            if(!title || !base64Image) { showSnackbar("請填寫標題並上傳圖片"); return; }
            if(!currentUser) return;

            btn.disabled = true;
            btn.innerText = "上傳中...";

            const newItemData = {
                id: isGuestMode ? 'guest-' + Date.now() : '',
                title: title, category: cat, description: desc, image: base64Image, likes: 0, isBookmarked: false,
                date: new Date().toISOString().split('T')[0], timestamp: Date.now()
            };

            try {
                if (isGuestMode) {
                    items.unshift(newItemData);
                    localStorage.setItem('guest_items', JSON.stringify(items));
                    renderUI();
                    showSnackbar("訪客收藏新增成功！");
                    closeAddModal();
                } else {
                    await addDoc(collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'items'), newItemData);
                    showSnackbar("雲端收藏新增成功！");
                    closeAddModal();
                }
            } catch(err) {
                showSnackbar("儲存發生異常");
            } finally {
                btn.disabled = false;
                btn.innerText = "儲存收藏";
            }
        };

        // Detail View Modal Control
        function openDetail(item) {
            triggerHaptic();
            currentDetailItem = item;
            document.getElementById('detail-image').src = item.image;
            document.getElementById('detail-image').onerror = function() {
                this.src = 'https://placehold.co/400x400/ecefef/191c1c?text=No+Image';
            };
            document.getElementById('detail-title').innerText = item.title;
            document.getElementById('detail-category').innerText = item.category;
            document.getElementById('detail-date').innerText = item.date;
            document.getElementById('detail-desc').innerText = item.description || '暫無描述。';
            document.getElementById('detail-like-count').innerText = item.likes || 0;
            
            const likeIcon = document.getElementById('detail-like-icon');
            likeIcon.className = `w-5 h-5 transition-all ${item.likes > 0 ? 'fill-[#BA1A1A] text-[#BA1A1A]' : ''}`;
            
            els.detailModal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                els.detailModal.querySelector('#detail-scrim').classList.remove('opacity-0');
                document.getElementById('detail-sheet').classList.remove('translate-y-full');
            }, 10);
        }

        function closeDetail() {
            els.detailModal.querySelector('#detail-scrim').classList.add('opacity-0');
            document.getElementById('detail-sheet').classList.add('translate-y-full');
            setTimeout(() => {
                els.detailModal.classList.add('opacity-0', 'pointer-events-none');
            }, 500);
        }

        document.getElementById('detail-scrim').onclick = closeDetail;
        document.getElementById('btn-close-detail').onclick = closeDetail;

        document.getElementById('btn-detail-like').onclick = async () => {
            if(!currentDetailItem) return;
            triggerHaptic('heavy');
            
            currentDetailItem.likes = (currentDetailItem.likes || 0) + 1;
            document.getElementById('detail-like-count').innerText = currentDetailItem.likes;
            
            const likeIcon = document.getElementById('detail-like-icon');
            likeIcon.className = 'w-5 h-5 fill-[#BA1A1A] text-[#BA1A1A] animate-pop';
            setTimeout(() => likeIcon.classList.remove('animate-pop'), 300);

            if (isGuestMode) {
                localStorage.setItem('guest_items', JSON.stringify(items));
                renderUI();
            } else if (currentUser) {
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'items', currentDetailItem.id), { 
                    likes: currentDetailItem.likes 
                });
            }
        };

        // Swipe-to-dismiss drag handle physics
        function setupSwipeToDismiss(handleId, sheetId, closeCallback) {
            const handle = document.getElementById(handleId);
            const sheet = document.getElementById(sheetId);
            let startY = 0;
            let currentY = 0;

            handle.addEventListener('touchstart', e => { 
                startY = e.touches[0].clientY; 
                sheet.style.transition = 'none'; 
            }, {passive: true});

            handle.addEventListener('touchmove', e => {
                const diff = e.touches[0].clientY - startY;
                if(diff > 0) { 
                    currentY = diff; 
                    sheet.style.transform = `translateY(${diff}px)`; 
                }
            }, {passive: true});

            handle.addEventListener('touchend', () => {
                sheet.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
                if(currentY > 150) {
                    triggerHaptic();
                    closeCallback();
                } else {
                    sheet.style.transform = 'translateY(0)';
                }
                currentY = 0;
            });
        }
        setupSwipeToDismiss('add-drag-handle', 'add-sheet', closeAddModal);
        setupSwipeToDismiss('detail-drag-handle', 'detail-sheet', closeDetail);

        // --- Tabs Selection, Search and Scrolling ---
        els.navTabs.forEach(tab => {
            tab.onclick = () => {
                activeTab = tab.dataset.tab;
                triggerHaptic();
                
                els.navTabs.forEach(t => {
                    const indicator = t.querySelector('.nav-indicator');
                    const text = t.querySelector('.nav-text');
                    const icon = t.querySelector('i');
                    if (t.dataset.tab === activeTab) {
                        indicator.classList.add('bg-md3-l_secondaryContainer', 'dark:bg-md3-d_secondaryContainer', 'scale-105');
                        indicator.classList.remove('bg-transparent');
                        text.classList.add('text-md3-l_text', 'dark:text-md3-d_text');
                        text.classList.remove('text-md3-l_textVariant', 'dark:text-md3-d_textVariant');
                        icon.classList.add('text-md3-l_onSecondaryContainer', 'dark:text-md3-d_onSecondaryContainer', 'fill-current');
                    } else {
                        indicator.classList.remove('bg-md3-l_secondaryContainer', 'dark:bg-md3-d_secondaryContainer', 'scale-105');
                        indicator.classList.add('bg-transparent');
                        text.classList.remove('text-md3-l_text', 'dark:text-md3-d_text');
                        text.classList.add('text-md3-l_textVariant', 'dark:text-md3-d_textVariant');
                        icon.classList.remove('text-md3-l_onSecondaryContainer', 'dark:text-md3-d_onSecondaryContainer', 'fill-current');
                    }
                });

                els.homeControls.style.display = activeTab === 'home' ? 'block' : 'none';
                els.topBarTitle.innerText = activeTab === 'home' ? '收藏館' : '我的收藏夾';
                els.topBarLargeTitle.innerText = activeTab === 'home' ? '探索收藏' : '我的收藏夾';
                renderUI();
            };
        });

        // Search inputs
        els.searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            els.btnClearSearch.style.display = searchQuery ? 'block' : 'none';
            renderUI();
        });
        els.btnClearSearch.onclick = () => {
            searchQuery = '';
            els.searchInput.value = '';
            els.btnClearSearch.style.display = 'none';
            renderUI();
        };

        // Grid/List toggle
        els.btnToggleView.onclick = () => {
            viewMode = viewMode === 'grid' ? 'list' : 'grid';
            els.btnToggleView.innerHTML = `<i data-lucide="${viewMode === 'grid' ? 'list' : 'grid'}" class="w-6 h-6"></i>`;
            triggerHaptic();
            renderUI();
        };

        // Scroll listener to hide elements & minimize AppBar
        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;
            const isScrolled = currentScrollY > 50;
            
            if (isScrolled) {
                els.topBar.classList.add('shadow-md', 'bg-md3-l_surfaceContainer/90', 'dark:bg-md3-d_surfaceContainer/90');
                els.topBarTitle.classList.remove('opacity-0');
                els.topBarLargeContainer.classList.add('h-0', 'opacity-0');
            } else {
                els.topBar.classList.remove('shadow-md', 'bg-md3-l_surfaceContainer/90', 'dark:bg-md3-d_surfaceContainer/90');
                els.topBarTitle.classList.add('opacity-0');
                els.topBarLargeContainer.classList.remove('h-0', 'opacity-0');
            }

            // Collapse FAB & hide navigation on scroll down
            if (currentScrollY > lastScrollY + 15 && isScrolled) {
                els.fab.classList.add('translate-y-24', 'opacity-0');
                els.bottomNav.classList.add('translate-y-full');
            } else if (currentScrollY < lastScrollY - 15) {
                els.fab.classList.remove('translate-y-24', 'opacity-0');
                els.bottomNav.classList.remove('translate-y-full');
            }
            
            if(isScrolled) {
                els.fab.classList.add('w-14', 'px-0');
                const span = els.fab.querySelector('span');
                if(span) span.classList.add('w-0', 'opacity-0', 'ml-0');
            } else {
                els.fab.classList.remove('w-14', 'px-0');
                const span = els.fab.querySelector('span');
                if(span) span.classList.remove('w-0', 'opacity-0', 'ml-0');
            }

            lastScrollY = currentScrollY;
        }, { passive: true });

    </script>
</body>
</html>
